<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STEP配信システム</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <div>
        <h1>STEP配信システム</h1>
        <p>入退くんメール代替・個別送信用</p>
      </div>
      <span class="badge">Ver.3</span>
    </header>

    <main class="panel">
      <section class="field">
        <label>テンプレート</label>
        <select id="templateSelect"></select>
      </section>

      <section class="grid2">
        <div class="field">
          <label>日付</label>
          <input id="dateInput" type="date" />
        </div>
        <div class="field">
          <label>時間帯</label>
          <select id="timeSelect">
            <option value="17:10～18:25">17:10～18:25</option>
            <option value="18:35～19:50">18:35～19:50</option>
            <option value="20:00～21:15">20:00～21:15</option>
            <option value="その他">その他</option>
          </select>
        </div>
      </section>

      <section id="customTimeBox" class="field hidden">
        <label>その他の時間帯</label>
        <input id="customTimeInput" type="text" placeholder="例：19:00～20:00" />
      </section>

      <section class="studentsBox">
        <div class="boxHeader">
          <h2>送信対象生徒</h2>
          <button id="reloadStudents" type="button">再読込</button>
        </div>

        <div class="grid2">
          <div class="field">
            <label>校舎</label>
            <select id="schoolFilter">
              <option value="全校舎">全校舎</option>
              <option value="神領校">神領校</option>
              <option value="大手町校">大手町校</option>
            </select>
          </div>
          <div class="field">
            <label>学年</label>
            <select id="gradeFilter">
              <option value="全学年">全学年</option>
              <option value="小1">小1</option><option value="小2">小2</option><option value="小3">小3</option>
              <option value="小4">小4</option><option value="小5">小5</option><option value="小6">小6</option>
              <option value="中1">中1</option><option value="中2">中2</option><option value="中3">中3</option>
              <option value="高1">高1</option><option value="高2">高2</option><option value="高3">高3</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>氏名検索</label>
          <input id="nameSearch" type="text" placeholder="例：山田、やまだ、太郎" />
        </div>

        <div class="studentStatus">
          <strong id="studentMessage">読み込み中...</strong>
          <strong id="selectedCount">選択 0人</strong>
        </div>
        <div id="studentList" class="studentList"></div>
      </section>

      <section class="field">
        <label>件名</label>
        <input id="subjectInput" type="text" />
      </section>

      <section class="field">
        <label>本文</label>
        <textarea id="bodyInput"></textarea>
      </section>

      <section class="field">
        <label>プレビュー</label>
        <div id="preview" class="preview"></div>
      </section>

      <button id="sendButton" class="sendButton" type="button">選択した生徒に配信する</button>
      <p id="statusMessage" class="status"></p>
    </main>
  </div>

  <script src="api.js?v=3"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
