<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>STEP配信システム Ver.20.2</title><link rel="stylesheet" href="style.css"></head><body><div class="wrap"><div class="top"><div><h1>STEP配信システム <span class="ver">Ver.20.2</span></h1><div class="sub">個別送信・添付・履歴・欠席確認</div></div><a class="pillLink" href="template.html">テンプレート設定</a></div><div class="grid"><main><section class="card"><label class="label">テンプレート</label><select id="templateSelect" class="input"></select><div class="templateLink"><a class="pillLink" href="template.html">テンプレート設定</a></div><div class="row" style="margin-top:14px"><div><label class="label">日付</label><input id="dateDisplay" class="input dateTextInput" readonly><input id="dateInput" type="date" class="hidden"></div><div><label class="label">時間帯</label><select id="timeSelect" class="input"><option>17:10～18:25</option><option>18:35～19:50</option><option>20:00～21:15</option><option value="custom">その他</option></select></div></div><div id="customTimeWrap" class="hidden" style="margin-top:10px"><label class="label">その他の時間帯</label><input id="customTime" class="input" placeholder="例：19:00～20:00"></div></section><section class="card"><div class="toolbar" style="margin-bottom:10px"><h2 style="margin:0;font-size:18px">送信対象生徒</h2><button id="refreshStudentsTopBtn" type="button" class="btn refreshBig primary">生徒情報を更新</button></div><div class="row"><div><label class="label">校舎</label><select id="schoolFilter" class="input"><option>全校舎</option><option>神領校</option><option>大手町校</option></select></div><div><label class="label">学年</label><div id="gradeButtons" class="gradeButtons"></div><div class="gradeActions"><button id="clearGradeBtn" type="button" class="btn small danger">全クリア</button><button id="sortAscBtn" type="button" class="btn small">学年（昇順）</button><button id="sortDescBtn" type="button" class="btn small">学年（降順）</button></div><div class="muted" style="margin-top:4px">複数選択できます。もう一度押すと解除します。</div></div></div><div style="margin-top:10px"><label class="label">氏名検索</label><input id="nameFilter" class="input" placeholder="例：山田、やまだ、太郎"></div><div class="selectedBox"><div class="toolbar"><b>現在選択中の生徒（送信後は自動で消えます）</b><span><button id="clearAllSelectedBtn" class="btn small danger">全選択解除</button> <span id="selectedCount" class="ver">0人</span></span></div><div id="selectedSummary" class="selectedSummary hidden"></div><div id="selectedList" class="selectedList"><span class="muted">まだ選択されていません。</span></div></div><div class="countLine"><span id="listCount">0人表示 / 0人取得</span><span><button id="refreshStudentsBtn" class="btn refreshBig">生徒情報を更新</button> <button id="selectVisibleBtn" class="btn small">全選択</button> <button id="clearVisibleBtn" class="btn small danger">全解除</button> <button id="invertVisibleBtn" class="btn small">反転</button></span></div><div id="studentList" class="studentArea"></div></section><section class="card"><label class="label">件名</label><input id="subjectInput" class="input"><div style="margin-top:14px" class="toolbar"><label class="label" style="margin:0">プレビュー</label><button id="toggleBodyBtn" class="btn small">本文変更</button></div><div id="preview" class="preview"></div><div id="bodyEditor" class="hidden" style="margin-top:10px"><textarea id="bodyInput" class="textarea"></textarea><button id="saveBodyBtn" class="btn primary" style="margin-top:8px">本文をプレビューへ反映</button></div><div style="margin-top:14px"><label class="label">添付ファイル</label><div id="dropZone" class="fileBox">ここへドラッグ＆ドロップ、または <input id="fileInput" type="file" multiple></div><div id="fileList" class="attachList"></div></div><button id="sendBtn" class="btn primary send">配信する</button><div id="status" class="message"></div></section></main><aside><section class="card"><div class="tabs"><button id="absenceTab" class="tab active">欠席連絡</button><button id="historyTab" class="tab">送信履歴</button></div><div id="absencePanel"><button id="reloadAbsence" class="btn small">更新</button><div id="absenceList" class="absenceList" style="margin-top:10px"></div></div><div id="historyPanel" class="hidden"><div class="row"><div><label class="label">From</label><input id="historyFrom" type="date" class="input"></div><div><label class="label">To</label><input id="historyTo" type="date" class="input"></div></div><input id="historySearch" class="input" style="margin-top:8px" placeholder="生徒名・件名で検索"><div class="historyButtons"><button id="reloadHistory" class="btn small">検索</button><button id="showArchiveBtn" class="btn small">アーカイブ</button><button id="showNormalHistoryBtn" class="btn small hidden">通常履歴に戻る</button></div><div id="historyList" class="historyList" style="margin-top:10px"></div></div></section></aside></div></div><script src="api.js"></script><script src="app.js"></script></body></html>
