<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>テンプレート設定 Ver.19</title><link rel="stylesheet" href="style.css"></head><body><div class="wrap"><div class="top"><div><h1>テンプレート設定 <span class="ver">Ver.19</span></h1><div class="sub">テンプレートの作成・修正</div></div><a class="pillLink returnBtn" href="index.html">配信画面へ戻る</a></div><div class="grid"><main><section class="card"><label class="label">テンプレート選択</label><select id="templateSelect" class="input"></select><div class="row" style="margin-top:12px"><div><label class="label">タイトル</label><input id="nameInput" class="input"></div><div><label class="label">件名</label><input id="subjectInput" class="input"></div></div><label class="label" style="margin-top:12px">本文</label><div class="insertButtons"><button class="btn small" data-ins="{{生徒名}}">生徒名</button><button class="btn small" data-ins="{{日付}}">日付</button><button class="btn small" data-ins="{{曜日}}">曜日</button><button class="btn small" data-ins="{{時間帯}}">時間帯</button><button class="btn small" data-ins="{{電話番号}}">電話番号</button></div><textarea id="bodyInput" class="textarea"></textarea><div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap"><button id="newBtn" class="btn">新規</button><button id="saveBtn" class="btn primary">保存する</button><button id="saveAsBtn" class="btn primary">名前をつけて保存</button><button id="deleteBtn" class="btn danger">削除</button></div><div id="status" class="message"></div></section></main><aside><section class="card"><h2 style="font-size:18px;margin-top:0">過去の送信履歴</h2><input id="historySearch" class="input" placeholder="生徒名・件名で検索"><button id="reloadHistory" class="btn small" style="margin-top:8px">更新</button><div id="historyList" class="historyList" style="margin-top:10px"></div></section></aside></div></div><script src="api.js"></script><script src="template.js"></script></body></html>
